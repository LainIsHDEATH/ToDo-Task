spring:
  datasource:
    url: jdbc:h2:mem:todo_tasks_test_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  liquibase:
    enabled: false

security:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173